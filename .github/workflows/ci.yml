name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        # Stylistic-only nits remaining (variable naming matching paper notation,
        # deferred imports).  Treat as advisory until they're addressed.
        run: ruff check . || true

  unit-tests:
    name: Unit tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Install (minimal — no rasterio/fiona/torch)
        run: |
          python -m pip install -U pip
          python -m pip install \
            pydantic numpy scikit-learn matplotlib reportlab \
            platformdirs pyyaml requests statsmodels \
            pytest hypothesis
          python -m pip install -e . --no-deps
      - name: Pytest (skip tests that need heavy GIS deps)
        run: |
          pytest -m unit -v \
            --ignore=tests/unit/test_bandset.py \
            --ignore=tests/unit/test_read_window.py \
            --ignore=tests/unit/test_reproject.py \
            --ignore=tests/unit/test_lazy_composite.py \
            --ignore=tests/unit/test_bfast_cusum.py \
            --ignore=tests/unit/test_postprocess.py \
            --ignore=tests/unit/test_recipes.py \
            --ignore=tests/unit/test_accuracy_report.py \
            --ignore=tests/unit/test_viz.py

  web-build:
    name: Build web tier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: src/terranova/ui_web
        run: npm ci || npm install
      - name: Typecheck
        working-directory: src/terranova/ui_web
        run: npm run typecheck
      - name: Build
        working-directory: src/terranova/ui_web
        run: npm run build

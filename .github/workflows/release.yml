name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package-and-publish:
    name: Build .zip, GitHub Release, plugins.qgis.org upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/terrascope/ui_web/package-lock.json

      - name: Build web tier
        working-directory: src/terrascope/ui_web
        run: |
          npm ci || npm install
          npm run build

      - name: Verify version sync
        run: python scripts/sync_version.py

      - name: Package
        run: make package

      - name: Update latest.json for the landing page
        # We push latest.json to the `landing` branch (served by Cloudflare Pages
        # from a separate worktree).  Only on real releases — pre-releases
        # skipped via the `if`.
        if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
             --arg notes "https://github.com/${GITHUB_REPOSITORY}/releases/tag/v$VERSION" \
             '.version=$v | .release_notes_url=$notes' \
             deploy/landing/latest.json > /tmp/latest.json
          mv /tmp/latest.json deploy/landing/latest.json

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/terrascope-*.zip
          generate_release_notes: true

      - name: Publish to plugins.qgis.org
        if: ${{ secrets.OSGEO_USERNAME != '' }}
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
        run: |
          pip install qgis-plugin-ci
          qgis-plugin-ci release "${GITHUB_REF_NAME#v}" \
            --osgeo-username "$OSGEO_USERNAME" \
            --osgeo-password "$OSGEO_PASSWORD"

  deploy-landing:
    name: Deploy landing page to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: package-and-publish
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: terrascope-landing
          directory: deploy/landing

  deploy-telemetry-worker:
    name: Deploy telemetry Cloudflare Worker
    runs-on: ubuntu-latest
    needs: package-and-publish
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: deploy/cloudflare-worker
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run typecheck
          npm test
          npx wrangler deploy

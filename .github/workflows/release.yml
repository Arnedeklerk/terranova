name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Build .zip + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web tier
        working-directory: src/terranova/ui_web
        run: |
          npm ci || npm install
          npm run build
      - name: Verify version sync
        run: python scripts/sync_version.py
      - name: Package
        run: make package
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/terranova-*.zip
          generate_release_notes: true

name: Release

# Only fires when you push a real semver tag, e.g. `git tag v0.2.0 && git push --tags`.
# Deployment to plugins.qgis.org / Cloudflare requires repository secrets;
# missing secrets just skip those steps.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Build .zip + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web tier
        working-directory: src/terrascope/ui_web
        run: |
          npm ci || npm install
          npm run build

      - name: Verify version sync
        run: python scripts/sync_version.py

      - name: Package
        run: make package

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/terrascope-*.zip
          generate_release_notes: true

      - name: Publish to plugins.qgis.org
        if: ${{ secrets.OSGEO_USERNAME != '' }}
        env:
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
        run: |
          pip install qgis-plugin-ci
          qgis-plugin-ci release "${GITHUB_REF_NAME#v}" \
            --osgeo-username "$OSGEO_USERNAME" \
            --osgeo-password "$OSGEO_PASSWORD"

  deploy-landing:
    name: Deploy landing page (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Skip if Cloudflare isn't configured
        id: gate
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN not set; skipping landing-page deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'
      - uses: cloudflare/pages-action@v1
        if: steps.gate.outputs.skip == 'false'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: terrascope-landing
          directory: deploy/landing

  deploy-telemetry-worker:
    name: Deploy telemetry Cloudflare Worker
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Skip if Cloudflare isn't configured
        id: gate
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN not set; skipping worker deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip == 'false'
        with:
          node-version: "20"
      - name: Deploy worker
        if: steps.gate.outputs.skip == 'false'
        working-directory: deploy/cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run typecheck
          npm test
          npx wrangler deploy

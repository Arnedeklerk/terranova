name: i18n

# Manual trigger only until Crowdin is set up.  Once you have the
# CROWDIN_PROJECT_ID and CROWDIN_PERSONAL_TOKEN repository secrets, add
# back the `push:` trigger.
on:
  workflow_dispatch:

jobs:
  sync:
    name: Sync sources & translations with Crowdin
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets are configured
        run: |
          if [ -z "${{ secrets.CROWDIN_PROJECT_ID }}" ]; then
            echo "CROWDIN_PROJECT_ID is not set — skipping sync."
            exit 0
          fi
      - uses: actions/checkout@v4
      - uses: crowdin/github-action@v2
        if: ${{ secrets.CROWDIN_PROJECT_ID != '' }}
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: i18n/sync
          create_pull_request: true
          pull_request_title: "i18n: sync translations from Crowdin"
          pull_request_body: |
            Automatic sync from the Crowdin project.  Review the diff for any
            locale we want to flag as ready for the next release.

name: Security scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit
        run: pip-audit -r <(pip install -e . --dry-run --quiet 2>&1 || true) || true
      # Planned: replace with `pip-audit --requirement requirements-lock.txt`.

  npm-audit:
    name: npm audit (web tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit
        working-directory: src/terranova/ui_web
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high || true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

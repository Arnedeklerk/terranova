name: Bug report
description: Something does not work as expected.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I clicked X, Y happened, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open QGIS 3.40.1
        2. Plugins → TerraScope
        3. Click Catalogue search
        4. ...
    validations:
      required: true
  - type: input
    id: terrascope-version
    attributes:
      label: TerraScope version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: qgis-version
    attributes:
      label: QGIS version
      placeholder: 3.40.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: TerraScope log output
      description: Copy the contents of the "TerraScope" tab in the QGIS Log Messages panel.
      render: text

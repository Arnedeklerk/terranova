site_name: TerraScope
site_description: A modern QGIS plugin for semi-automatic classification and change detection.
site_url: https://docs.terrascope.app
repo_url: https://github.com/terrascope-rs/terrascope
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Installation: installation.md
  - Coming from SCP?: scp_migration.md
  - Architecture: architecture.md
  - Development: development.md
  - Phase 4 deployment: phase4_deployment.md
  - Reviewer checklist: reviewer.md
  - Risk register: risks.md
  - ML stack: ml.md
  - Recipes: recipes.md
  - CLI: cli.md
  - Workflows:
      - Classification: workflows/classification.md
      - Time-series: workflows/timeseries.md
      - SAM segmentation: workflows/sam.md
  - API reference: api/index.md
  - Telemetry: telemetry.md
  # Privacy & Changelog live at the repo root rather than under docs/, so we
  # link to the GitHub copies rather than including them as MkDocs pages.
